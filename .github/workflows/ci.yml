name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install Python deps
        run: |
          pip install -e packages/contracts
      - name: Install Node deps
        run: |
          cd apps/frontend && npm ci
      - name: Run Pydantic contracts
        run: |
          pytest packages/contracts || true
      - name: Run Zod contracts
        run: |
          cd apps/frontend && npm run test:contracts || true

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install -e packages/contracts
          pip install -e apps/backend
      - name: Run tests
        run: |
          cd apps/backend && pytest

  workers:
    name: Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install -e packages/contracts
          pip install -r workers/ytd/requirements.txt
          pip install -r workers/ffmpeg/requirements.txt
          pip install -r workers/transcribe/requirements.txt
          pip install -r workers/summary/requirements.txt
          pip install -r workers/tags/requirements.txt
      - name: Run tests
        run: |
          pytest workers

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install deps
        run: |
          cd apps/frontend && npm ci
      - name: Run tests
        run: |
          cd apps/frontend && npm test
      - name: Build
        run: |
          cd apps/frontend && npm run build

  compose-config:
    name: Docker Compose Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker compose config
        run: |
          docker compose config
