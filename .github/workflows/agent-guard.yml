name: Agent Guard

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  guardrails:
    name: Issue-driven guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check PR links an issue
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if echo "$PR_BODY" | grep -iE '(Closes|Fixes|Resolves) #[0-9]+'; then
            echo "OK: PR links an issue."
          else
            echo "ERROR: PR body must link an issue using Closes/Fixes/Resolves #<number>"
            exit 1
          fi
      - name: Check PR includes test evidence
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if echo "$PR_BODY" | grep -qiE '(test|pass|fail|pytest|vitest|npm test)'; then
            echo "OK: PR includes test evidence."
          else
            echo "WARNING: PR body does not mention test evidence."
          fi
      - name: Check generated media not committed
        run: |
          MEDIA=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || git diff --name-only HEAD~1)
          BAD=""
          for f in $MEDIA; do
            case "$f" in
              storage/videos/*|storage/audio/*|storage/thumbnails/*|storage/transcripts/*)
                BAD="$BAD $f"
                ;;
            esac
          done
          if [ -n "$BAD" ]; then
            echo "ERROR: Generated media files should not be committed:$BAD"
            exit 1
          fi
          echo "OK: No generated media committed."
      - name: Flag broad cross-layer changes
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || git diff --name-only HEAD~1)
          LAYERS=""
          for f in $CHANGED; do
            case "$f" in
              apps/backend/*) LAYERS="$LAYERS backend" ;;
              apps/frontend/*) LAYERS="$LAYERS frontend" ;;
              workers/*) LAYERS="$LAYERS workers" ;;
              packages/contracts/*) LAYERS="$LAYERS contracts" ;;
            esac
          done
          UNIQUE=$(echo "$LAYERS" | tr ' ' '\n' | sort -u | wc -l)
          if [ "$UNIQUE" -gt 2 ]; then
            echo "WARNING: Cross-layer change touching $UNIQUE layers: $LAYERS"
          else
            echo "OK: Changes contained within $UNIQUE layer(s)."
          fi
