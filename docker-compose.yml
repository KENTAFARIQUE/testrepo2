services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./data:/app/apps/backend/data

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

  ytd-worker:
    build:
      context: .
      dockerfile: workers/ytd/Dockerfile
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data

  ffmpeg-worker:
    build:
      context: .
      dockerfile: workers/ffmpeg/Dockerfile
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data

  transcribe-worker:
    build:
      context: .
      dockerfile: workers/transcribe/Dockerfile
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data

  summary-worker:
    build:
      context: .
      dockerfile: workers/summary/Dockerfile
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data

  tags-worker:
    build:
      context: .
      dockerfile: workers/tags/Dockerfile
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
